<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Imagem jurídica</title>
  <desc id="desc">Ilustração com balança da justiça e martelo jurídico.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#24141a" />
      <stop offset="100%" stop-color="#5f333d" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2d3a1" />
      <stop offset="100%" stop-color="#d9a75f" />
