    <path d="M470 300l-90 165h180l-90-165z" stroke-width="18" />
    <path d="M730 300l-90 165h180l-90-165z" stroke-width="18" />
    <path d="M480 680h240" stroke-width="34" />
    <circle cx="600" cy="142" r="26" fill="url(#gold)" stroke-width="0" />
  </g>

  <g fill="url(#gold)">
    <rect x="180" y="640" width="190" height="44" rx="12" transform="rotate(-18 180 640)" />
    <rect x="280" y="560" width="130" height="78" rx="14" transform="rotate(-18 280 560)" />
  </g>
</svg>
